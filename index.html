<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ＷＤ訂購單</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f4f4f9; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; margin-bottom: 20px; }
        
        /* 💡 新增 white-space: pre-wrap; 讓網頁能看懂試算表的換行符號 */
        .announcement-box { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 15px; border: 1px solid #ffeeba; display: none; line-height: 1.6; white-space: pre-wrap; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input[type="text"], select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background-color: white; }
        button { margin-top: 30px; padding: 15px; background-color: #007BFF; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; width: 100%; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #a0c4ff; cursor: not-allowed; }
        .footer-note { text-align: center; color: #888; font-size: 13px; margin-top: 20px; }
        #drinkOptions { transition: all 0.3s ease; overflow: hidden; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📝 ＷＤ 幸福下午茶點 訂購單</h1>
        
        <div id="announcementBox" class="announcement-box"></div>

        <form id="orderForm">
            <label for="name">姓名：</label>
            <input type="text" id="name" name="name" required placeholder="請輸入您的姓名">

            <label for="house">戶別：</label>
            <select id="house" name="house" required>
                <option value="" disabled selected>請選擇戶別</option>
                <option value="G戶">G戶</option>
                <option value="A戶">A戶</option>
            </select>

            <label for="drink">訂購品項：</label>
            <select id="drink" name="drink" required>
                <option value="" disabled selected>🔄 資料載入中...</option>
            </select>

            <div id="drinkOptions">
                <label for="sugar">甜度：</label>
                <select id="sugar" name="sugar" required>
                    <option value="" disabled selected>請選擇甜度</option>
                    <option value="微糖">微糖 (三分)</option>
                    <option value="無糖">無糖</option>
                </select>

                <label for="ice">冰塊：</label>
                <select id="ice" name="ice" required>
                    <option value="" disabled selected>請選擇冰塊</option>
                    <option value="微冰">微冰</option>
                    <option value="熱">熱</option>
                </select>
            </div>

            <button type="submit" id="submitBtn" disabled>請稍候...</button>
        </form>
        <div class="footer-note">訂單送出後將自動彙整至ＳＨＡＮＥ後台</div>
    </div>

    <script>
        // ⚠️ 請務必將下方的網址替換成您的 Web App 網址
        const scriptURL = 'https://script.google.com/macros/s/AKfycbzfK7HOMkE2v60pUISkvZQwMNo2vz9pP3ln-UXr3c7ZNVKzlaMUitwbZxYAFXelw2bIiQ/exec';
        
        const form = document.forms['orderForm'];
        const submitBtn = document.getElementById('submitBtn');
        const drinkSelect = document.getElementById('drink');
        const drinkOptionsDiv = document.getElementById('drinkOptions');
        const sugarSelect = document.getElementById('sugar');
        const iceSelect = document.getElementById('ice');
        const announcementBox = document.getElementById('announcementBox');

        window.onload = function() {
            fetch(scriptURL)
                .then(response => response.json())
                .then(data => {
                    // 1. 處理公告文字：直接顯示試算表的原始排版
                    if (data.announcement && data.announcement.trim() !== "") {
                        announcementBox.textContent = data.announcement;
                        announcementBox.style.display = 'block'; 
                    } else {
                        announcementBox.style.display = 'none';  
                    }

                    // 2. 處理選單資料
                    const menu = data.menu;
                    drinkSelect.innerHTML = '<option value="" disabled selected>請選擇品項</option>';
                    
                    menu.forEach(item => {
                        let option = document.createElement('option');
                        option.value = item.name;
                        option.textContent = item.name;
                        option.dataset.category = item.category;
                        drinkSelect.appendChild(option);
                    });
                    
                    submitBtn.textContent = '送出訂單';
                    submitBtn.disabled = false;
                })
                .catch(error => {
                    drinkSelect.innerHTML = '<option value="" disabled selected>讀取失敗，請重新整理</option>';
                });
        };

        drinkSelect.addEventListener('change', function() {
            const selectedOption = this.options[this.selectedIndex];
            const category = selectedOption.dataset.category;

            if (category === '熱食') {
                drinkOptionsDiv.style.display = 'none';
                sugarSelect.required = false;
                iceSelect.required = false;
                sugarSelect.value = "";
                iceSelect.value = "";
            } else {
                drinkOptionsDiv.style.display = 'block';
                sugarSelect.required = true;
                iceSelect.required = true;
            }
        });

        form.addEventListener('submit', e => {
            e.preventDefault(); 
            
            submitBtn.textContent = '資料傳送中...';
            submitBtn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    alert('🎉 訂單送出成功！');
                    form.reset(); 
                    drinkOptionsDiv.style.display = 'block';
                    sugarSelect.required = true;
                    iceSelect.required = true;
                    submitBtn.textContent = '送出訂單';
                    submitBtn.disabled = false;
                })
                .catch(error => {
                    alert('❌ 發生錯誤，請檢查網路後重試！');
                    submitBtn.textContent = '送出訂單';
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
